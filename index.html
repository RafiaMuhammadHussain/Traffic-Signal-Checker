<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Signal Checker</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container text-center d-flex flex-column justify-content-center align-items-center min-vh-100">

        <h1 class="mb-4">🚦Traffic Signal Checker</h1>

        <!-- Traffic Lights -->
        <div class="signal-box mb-4">
            <div id="redLight" class="light"></div>
            <div id="yellowLight" class="light"></div>
            <div id="greenLight" class="light"></div>
        </div>

        <input type="text" id="colorInput" placeholder="Enter: red, yellow, green"
            class="form-control col-10 col-md-6 col-lg-4 mx-auto mb-3" onclick="clearAll()">

        <button onclick="signalChecker()" class="btn btn-danger px-4">
            Check Signal
        </button>

        <p id="message" class="mt-3 fw-bold"></p>

    </div>

    <script src="./app.js"></script>
</body>

</html>
